# ==============================================================================
# Web Deployment — Golfcart
# ==============================================================================
# Builds the SPA and deploys it to Cloudflare Pages. The API is expected to be
# reachable at VITE_API_BASE_URL (the "golf" tailscale machine over HTTPS via
# `tailscale serve`) — the client fetches it directly from the browser.
#
# Required Secrets:
#   - CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# ==============================================================================

name: Deploy Web

on:
  push:
    branches: [master]
    paths:
      - "packages/web/**"
      - "packages/client/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @golfcart/web build
        env:
          VITE_API_BASE_URL: https://golf.tailca3fd9.ts.net

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/web
          command: pages deploy dist/client --project-name=golfcart --branch=master
